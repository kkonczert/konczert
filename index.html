<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krisztián — Coffee · Stairs · Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Grotesk:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0c0b;
      --surface: #131110;
      --gold: #c9b99a;
      --gold-bright: #e8d9c0;
      --gold-dim: rgba(201,185,154,0.4);
      --gold-faint: rgba(201,185,154,0.12);
      --gap: 3px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--gold);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2.4rem 3rem 2rem;
      border-bottom: 0.5px solid var(--gold-faint);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .site-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing: 0.06em;
      color: var(--gold-bright);
    }

    .site-tagline {
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ── INTRO ── */
    .intro-strip {
      padding: 1.8rem 3rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      border-bottom: 0.5px solid rgba(201,185,154,0.06);
    }

    .intro-line {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 1.2vw, 15px);
      color: rgba(201,185,154,0.45);
      letter-spacing: 0.06em;
      flex: 1;
    }

    .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(201,185,154,0.2); flex-shrink: 0; }

    .location {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(201,185,154,0.22);
      white-space: nowrap;
    }

    /* ── GALLERY ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      padding: var(--gap);
    }

    .photo-slot {
      background: var(--surface);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-slot.wide {
      grid-column: span 2;
    }

    .photo-slot img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease;
    }

    .photo-slot:hover img {
      transform: scale(1.04);
      opacity: 0.88;
    }

    .photo-label {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(201,185,154,0.3);
      font-weight: 300;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .photo-slot:hover .photo-label {
      opacity: 1;
    }

    /* placeholder for empty slots */
    .photo-slot.empty {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-slot.empty span {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(201,185,154,0.12);
    }

    /* ── FOOTER ── */
    footer {
      padding: 2.5rem 3rem;
      border-top: 0.5px solid var(--gold-faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--gap);
    }

    .contact-label {
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(201,185,154,0.3);
      margin-bottom: 6px;
    }

    .contact-email {
      font-family: 'Syne', sans-serif;
      font-weight: 400;
      font-size: clamp(14px, 1.5vw, 18px);
      color: var(--gold-bright);
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .contact-email:hover { opacity: 0.6; }

    .copy {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(201,185,154,0.18);
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header { padding: 1.6rem 1.4rem; }
      .intro-strip { padding: 1.4rem; }
      .gallery { grid-template-columns: repeat(2, 1fr); }
      .photo-slot.wide { grid-column: span 2; }
      footer { padding: 1.8rem 1.4rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
